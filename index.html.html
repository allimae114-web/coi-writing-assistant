<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COI Communications Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ec;
    --surface: #ffffff;
    --surface2: #f9f7f4;
    --border: #e2ddd6;
    --navy: #1a2744;
    --navy-light: #2a3d66;
    --accent: #c17f3a;
    --accent-light: #f5ead9;
    --text: #1a1a1a;
    --text-mid: #4a4a4a;
    --text-muted: #8a8276;
    --green: #2d6a4f;
    --green-light: #e8f4ee;
    --radius: 6px;
    --shadow: 0 2px 20px rgba(26,39,68,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Sidebar + Main layout */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--navy);
    padding: 36px 28px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-brand {
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .sidebar-brand .eyebrow {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .sidebar-brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: white;
    line-height: 1.25;
  }

  .sidebar-brand h1 span {
    color: var(--accent);
  }

  .sidebar-section {
    margin-bottom: 28px;
  }

  .sidebar-section label {
    display: block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent;
    color: rgba(255,255,255,0.6);
    transition: all 0.15s ease;
    font-family: 'DM Sans', sans-serif;
  }

  .pill:hover {
    border-color: rgba(255,255,255,0.4);
    color: white;
  }

  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .tone-pairs {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .tone-pair {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .tone-pair .tone-divider {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    flex-shrink: 0;
    padding: 0 2px;
  }

  /* Main content */
  .main {
    padding: 48px 52px;
    max-width: 860px;
  }

  .main-header {
    margin-bottom: 36px;
  }

  .main-header .eyebrow {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .main-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.2;
  }

  /* Input card */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
    margin-bottom: 28px;
    box-shadow: var(--shadow);
  }

  .input-card label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--navy);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .input-card textarea {
    width: 100%;
    min-height: 130px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--surface2);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .input-card textarea:focus {
    border-color: var(--navy);
  }

  .input-card textarea::placeholder {
    color: var(--text-muted);
  }

  /* Selection summary */
  .selection-summary {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .summary-tag {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--navy);
    color: white;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }

  .summary-tag .label {
    color: rgba(255,255,255,0.5);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .summary-tag.empty {
    background: var(--border);
    color: var(--text-muted);
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    padding: 16px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:hover:not(:disabled) {
    background: var(--navy-light);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(26,39,68,0.25);
  }

  .generate-btn:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
    transform: none;
  }

  .generate-btn .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* Loading dots */
  .dots { display: inline-flex; gap: 4px; }
  .dots span {
    width: 5px; height: 5px;
    background: white; border-radius: 50%;
    animation: dotBounce 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Output */
  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-top: 28px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .output-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .output-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }

  .output-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .copy-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover { border-color: var(--navy); color: var(--navy); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-light); }

  .output-body {
    padding: 28px 32px;
  }

  .output-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
  }

  /* Hashtag section */
  .hashtag-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .hashtag-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .hashtag-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .hashtag-chip {
    padding: 5px 12px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid transparent;
    user-select: none;
  }

  .hashtag-chip:hover {
    border-color: var(--accent);
  }

  .hashtag-chip.selected {
    background: var(--accent);
    color: white;
  }

  .hashtag-copy-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
  }

  .hashtag-copy-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .hashtag-copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hashtag-copy-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-light); }

  .hashtag-hint {
    font-size: 12px;
    color: var(--text-muted);
  }

  .error-msg {
    padding: 14px 18px;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: var(--radius);
    color: #b91c1c;
    font-size: 14px;
    margin-top: 16px;
  }

  /* Scrollbar styling for sidebar */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; }
    .main { padding: 32px 24px; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="eyebrow">UNT College of Information</div>
      <h1>Communications <span>Assistant</span></h1>
    </div>

    <!-- Channel -->
    <div class="sidebar-section">
      <label>Channel</label>
      <div class="pill-group" id="channelGroup">
        <button class="pill active" data-val="Email">Email</button>
        <button class="pill" data-val="LinkedIn (College Page)">LinkedIn — College</button>
        <button class="pill" data-val="LinkedIn (Personal/Repost)">LinkedIn — Personal</button>
        <button class="pill" data-val="Instagram">Instagram</button>
        <button class="pill" data-val="Facebook">Facebook</button>
        <button class="pill" data-val="YouTube Caption">YouTube</button>
        <button class="pill" data-val="Newsletter Blurb">Newsletter</button>
      </div>
    </div>

    <!-- Communication Type -->
    <div class="sidebar-section">
      <label>Communication Type</label>
      <div class="pill-group" id="typeGroup">
        <button class="pill active" data-val="Announcement">Announcement</button>
        <button class="pill" data-val="Program Highlight">Program Highlight</button>
        <button class="pill" data-val="Newsletter">Newsletter</button>
        <button class="pill" data-val="Re-engagement">Re-engagement</button>
        <button class="pill" data-val="Crisis / Urgent Notice">Crisis / Urgent</button>
        <button class="pill" data-val="Student Event Promotion">Student Event</button>
        <button class="pill" data-val="Alumni Event Promotion">Alumni Event</button>
        <button class="pill" data-val="Industry Event Promotion">Industry Event</button>
        <button class="pill" data-val="Event Reminder">Event Reminder</button>
        <button class="pill" data-val="Student / Alumni Spotlight">Spotlight</button>
        <button class="pill" data-val="Faculty & Staff Recognition">Recognition</button>
        <button class="pill" data-val="Call to Action / Apply Now">CTA / Apply Now</button>
        <button class="pill" data-val="Deadline Reminder">Deadline Reminder</button>
        <button class="pill" data-val="Donor & Partner Acknowledgment">Donor / Partner</button>
      </div>
    </div>

    <!-- Audience -->
    <div class="sidebar-section">
      <label>Audience</label>
      <div class="pill-group" id="audienceGroup">
        <button class="pill active" data-val="Prospective Students">Prospective Students</button>
        <button class="pill" data-val="Current Students">Current Students</button>
        <button class="pill" data-val="Alumni">Alumni</button>
        <button class="pill" data-val="Faculty & Staff">Faculty & Staff</button>
        <button class="pill" data-val="Donors & Prospects">Donors & Prospects</button>
        <button class="pill" data-val="Industry & Community Partners">Industry & Partners</button>
        <button class="pill" data-val="General Public / Media">General Public</button>
      </div>
    </div>

    <!-- Tone -->
    <div class="sidebar-section">
      <label>Tone</label>
      <div class="tone-pairs" id="toneGroup">
        <div class="tone-pair">
          <button class="pill active" data-pair="0" data-val="Formal">Formal</button>
          <span class="tone-divider">or</span>
          <button class="pill" data-pair="0" data-val="Conversational">Conversational</button>
        </div>
        <div class="tone-pair">
          <button class="pill active" data-pair="1" data-val="Celebratory">Celebratory</button>
          <span class="tone-divider">or</span>
          <button class="pill" data-pair="1" data-val="Informational">Informational</button>
        </div>
        <div class="tone-pair">
          <button class="pill active" data-pair="2" data-val="Time-Sensitive">Time-Sensitive</button>
          <span class="tone-divider">or</span>
          <button class="pill" data-pair="2" data-val="General/Ongoing">General/Ongoing</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-header">
      <div class="eyebrow">Draft your content</div>
      <h2>What do you need to communicate?</h2>
    </div>

    <!-- Selection summary -->
    <div class="selection-summary" id="selectionSummary"></div>

    <!-- Input card -->
    <div class="input-card">
      <label>Your key points</label>
      <textarea id="rawInput" placeholder="Drop in your key points, facts, dates, details — however rough. The assistant will handle the rest."></textarea>
    </div>

    <!-- Generate -->
    <button class="generate-btn" id="generateBtn" onclick="generate()">
      <div class="btn-inner" id="btnInner">
        <span>Generate Content</span>
        <span style="opacity:0.6; font-size:13px;">→</span>
      </div>
    </button>

    <div id="errorMsg" style="display:none;" class="error-msg"></div>

    <!-- Output -->
    <div id="outputCard" class="output-card" style="display:none;">
      <div class="output-header">
        <div class="output-header-left">
          <div class="output-dot"></div>
          <span class="output-label" id="outputLabel">Generated Content</span>
        </div>
        <button class="copy-btn" id="copyBtn" onclick="copyOutput()">Copy</button>
      </div>
      <div class="output-body">
        <div class="output-text" id="outputText"></div>
        <div class="hashtag-section" id="hashtagSection" style="display:none;">
          <div class="hashtag-label">Suggested Hashtags — click to select, then copy</div>
          <div class="hashtag-chips" id="hashtagChips"></div>
          <div class="hashtag-copy-row">
            <button class="hashtag-copy-btn" id="hashtagCopyBtn" onclick="copyHashtags()">Copy Selected</button>
            <span class="hashtag-hint">Click tags to select, then copy to clipboard</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  // State
  const state = {
    channel: 'Email',
    type: 'Announcement',
    audience: 'Prospective Students',
    selectedHashtags: new Set()
  };

  // Pill group logic
  function initPillGroup(groupId, stateKey) {
    const group = document.getElementById(groupId);
    group.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state[stateKey] = btn.dataset.val;
        updateSummary();
      });
    });
  }

  initPillGroup('channelGroup', 'channel');
  initPillGroup('audienceGroup', 'audience');

  // Communication type — multi-select
  state.types = ['Announcement'];
  document.getElementById('typeGroup').querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.val;
      if (state.types.includes(val)) {
        if (state.types.length === 1) return; // keep at least one selected
        state.types = state.types.filter(t => t !== val);
        btn.classList.remove('active');
      } else {
        state.types.push(val);
        btn.classList.add('active');
      }
      updateSummary();
    });
  });

  // Tone pair buttons — one active per pair
  const toneState = ['Formal', 'Celebratory', 'Time-Sensitive'];

  document.getElementById('toneGroup').querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const pair = btn.dataset.pair;
      document.getElementById('toneGroup')
        .querySelectorAll(`.pill[data-pair="${pair}"]`)
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      toneState[parseInt(pair)] = btn.dataset.val;
    });
  });

  function updateSummary() {
    const summary = document.getElementById('selectionSummary');
    const typesDisplay = state.types.join(', ');
    summary.innerHTML = `
      <div class="summary-tag"><span class="label">Channel</span>${state.channel}</div>
      <div class="summary-tag"><span class="label">Type</span>${typesDisplay}</div>
      <div class="summary-tag"><span class="label">Audience</span>${state.audience}</div>
    `;
  }
  updateSummary();

  // Build the system prompt from the style guide
  function buildSystemPrompt() {
    const { channel, types, audience } = state;
    const type = types.join(' + ');

    const isEmailChannel = channel === 'Email';
    const isLinkedInCollege = channel === 'LinkedIn (College Page)';
    const isLinkedInPersonal = channel === 'LinkedIn (Personal/Repost)';
    const isInstagram = channel === 'Instagram';
    const isDonorIndustry = audience === 'Donors & Prospects' || audience === 'Industry & Community Partners';
    const isStudentAlumniFacultyStaff = ['Prospective Students','Current Students','Alumni','Faculty & Staff'].includes(audience);

    const tone1 = toneState[0];
    const tone2 = toneState[1];
    const tone3 = toneState[2];

    let greetingRule = '';
    if (isEmailChannel) {
      if (isStudentAlumniFacultyStaff) greetingRule = `Open with: "Greetings [specific audience label],"`;
      else if (isDonorIndustry) greetingRule = `Open with: "Hello [specific audience label],"`;
      else greetingRule = `Open with: "Greetings,"`;
    }

    const signOffRule = isEmailChannel ? `Close with: "Best wishes," followed by a placeholder for name/title.` : `No sign-off.`;

    const subjectRule = isEmailChannel
      ? `Always include a subject line at the top in the format "Subject: [subject text]".`
      : isLinkedInCollege
      ? `Open with a punchy benefit-driven headline (not labeled "Subject").`
      : `No subject line.`;

    const contractionRule = isDonorIndustry
      ? `Minimize contractions. Keep language polished and professional.`
      : `Contractions are acceptable.`;

    let formatGuide = '';
    if (isEmailChannel) {
      formatGuide = `Structure: Subject line → Greeting → Body (2–4 short paragraphs) → Direct CTA with [link placeholder] → Sign-off. Structured details like dates/times can use line breaks for readability.`;
    } else if (isLinkedInCollege) {
      formatGuide = `Structure: Headline hook (1 line) → Program/event name → When/Where/Pricing block (if applicable) → Context paragraph → "What you'll gain:" benefit bullets → Ideal audience note → Direct CTA with [link placeholder] → Hashtags placeholder.`;
    } else if (isLinkedInPersonal) {
      formatGuide = `Structure: Hook question or observation (1–2 sentences) → Brief context → CTA or link placeholder → Short hashtag note.`;
    } else if (isInstagram) {
      formatGuide = `Structure: Hook or congratulatory opener → Short paragraphs or emoji-formatted details → "Learn more at the link in bio" or similar CTA → Hashtag placeholder. Use emojis purposefully. Keep it warm and accessible.`;
    } else if (channel === 'Facebook') {
      formatGuide = `Mid-length. Friendly and accessible. Include a clear CTA with [link placeholder].`;
    } else if (channel === 'YouTube Caption') {
      formatGuide = `1–2 sentence description → [link placeholder]. Keep it brief and descriptive.`;
    } else if (channel === 'Newsletter Blurb') {
      formatGuide = `2–3 sentences max → "Read more: [link placeholder]". Tease the content, don't over-explain.`;
    }

    return `You are a professional communications writer for the University of North Texas College of Information (UNT COI). You write email and social media content that is polished, on-brand, and audience-appropriate.

CURRENT REQUEST:
- Channel: ${channel}
- Communication type: ${type}
- Audience: ${audience}
- Tone: ${tone1} · ${tone2} · ${tone3}

STYLE RULES — FOLLOW THESE EXACTLY:

1. SUBJECT LINE: ${subjectRule}
2. GREETING: ${greetingRule || 'No greeting for social media.'}
3. SIGN-OFF: ${signOffRule}
4. CONTRACTIONS: ${contractionRule}
5. CTA: Every piece must have one clear, direct call to action (e.g., "Register now," "Apply today," "Learn more at the link in bio"). Include a [link] placeholder where appropriate.
6. FORMAT: ${formatGuide}
7. LANGUAGE TO AVOID:
   - Never use "not this, but this" constructions — reframe positively
   - Never use filler openers: "I hope this finds you well," "Just wanted to reach out," "I am pleased to announce"
   - Avoid explicitly political or DEI-coded language — write inclusively without charged terminology
   - Avoid passive, hedging, or over-formal bureaucratic language unless the audience requires formality
8. HASHTAGS: Do NOT include hashtags in the main content. After the content, on a new line, write "HASHTAGS:" followed by a comma-separated list of 8–12 suggested general hashtags relevant to the topic (no UNT-specific tags). These will be displayed separately.

Write only the content. No preamble, no explanation, no meta-commentary. Just the finished piece followed by the HASHTAGS line.`;
  }

  async function generate() {
    const raw = document.getElementById('rawInput').value.trim();
    if (!raw) return;

    const btn = document.getElementById('generateBtn');
    const btnInner = document.getElementById('btnInner');
    const outputCard = document.getElementById('outputCard');
    const errorMsg = document.getElementById('errorMsg');

    btn.disabled = true;
    btnInner.innerHTML = `<div class="dots"><span></span><span></span><span></span></div><span>Drafting...</span>`;
    outputCard.style.display = 'none';
    errorMsg.style.display = 'none';
    state.selectedHashtags.clear();

    const systemPrompt = buildSystemPrompt();
    const userPrompt = `Here are the key points to transform into a finished ${state.channel} ${state.types.join(' + ')} for ${state.audience}:\n\n${raw}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      const data = await response.json();
      const fullText = data.content?.[0]?.text || '';

      // Split content from hashtags
      const hashtagSplit = fullText.split(/\nHASHTAGS:/i);
      const contentText = hashtagSplit[0].trim();
      const hashtagRaw = hashtagSplit[1]?.trim() || '';

      // Render content
      document.getElementById('outputText').textContent = contentText;
      document.getElementById('outputLabel').textContent = `${state.channel} · ${state.types.join(' + ')}`;
      document.getElementById('copyBtn').textContent = 'Copy';
      document.getElementById('copyBtn').classList.remove('copied');

      // Render hashtags if social
      const hashtagSection = document.getElementById('hashtagSection');
      const isSocialChannel = state.channel !== 'Email' && state.channel !== 'Newsletter Blurb';

      if (isSocialChannel && hashtagRaw) {
        const tags = hashtagRaw.split(',').map(t => t.trim().replace(/^#/, '').trim()).filter(Boolean);
        const chipsContainer = document.getElementById('hashtagChips');
        chipsContainer.innerHTML = '';
        tags.forEach(tag => {
          const chip = document.createElement('button');
          chip.className = 'hashtag-chip';
          chip.textContent = `#${tag}`;
          chip.addEventListener('click', () => {
            if (state.selectedHashtags.has(tag)) {
              state.selectedHashtags.delete(tag);
              chip.classList.remove('selected');
            } else {
              state.selectedHashtags.add(tag);
              chip.classList.add('selected');
            }
          });
          chipsContainer.appendChild(chip);
        });
        document.getElementById('hashtagCopyBtn').textContent = 'Copy Selected';
        document.getElementById('hashtagCopyBtn').classList.remove('copied');
        hashtagSection.style.display = 'block';
      } else {
        hashtagSection.style.display = 'none';
      }

      outputCard.style.display = 'block';
      outputCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    } catch (err) {
      errorMsg.textContent = 'Something went wrong. Please try again.';
      errorMsg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btnInner.innerHTML = `<span>Generate Content</span><span style="opacity:0.6; font-size:13px;">→</span>`;
    }
  }

  function copyOutput() {
    const text = document.getElementById('outputText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function copyHashtags() {
    if (state.selectedHashtags.size === 0) {
      // Copy all if none selected
      const all = [...document.getElementById('hashtagChips').querySelectorAll('.hashtag-chip')]
        .map(c => c.textContent).join(' ');
      navigator.clipboard.writeText(all);
    } else {
      const selected = [...state.selectedHashtags].map(t => `#${t}`).join(' ');
      navigator.clipboard.writeText(selected);
    }
    const btn = document.getElementById('hashtagCopyBtn');
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Selected'; btn.classList.remove('copied'); }, 2000);
  }

  // Enter key in textarea
  document.getElementById('rawInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
  });
</script>
</body>
</html>
